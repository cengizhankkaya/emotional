name: emotional
description: "A new Flutter project."
publish_to: 'none' 

version: 1.1.0+22

environment:
  sdk: ^3.10.4
dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  lottie: ^3.1.2

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  media_kit: ^1.1.10
  media_kit_video: ^2.0.1
  media_kit_libs_android_video: ^1.3.8
  media_kit_libs_ios_video: ^1.1.4

  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  file_picker: ^12.0.0-beta.7
  google_sign_in: ^7.0.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  path_provider: ^2.1.6
  firebase_core: ^4.11.0
  firebase_database: ^12.4.3
  firebase_auth: ^6.5.3
  firebase_remote_config: ^6.5.3
  firebase_analytics: ^12.4.3
  package_info_plus: ^10.1.0
  background_downloader: ^9.5.5
  permission_handler: ^12.0.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  camera: ^0.12.0+1
  flutter_webrtc: ^1.5.2
  easy_localization: ^3.0.8
  google_fonts: ^8.0.0
  connectivity_watcher: ^3.0.6
  youtube_explode_dart: ^3.1.0
  envied: ^1.3.3
  
  # Icon Packages
  font_awesome_flutter: ^11.0.0
  hugeicons: ^1.1.7
  device_info_plus: ^13.1.0
  share_plus: ^13.1.0
  app_links: ^7.0.0
  shared_preferences: ^2.5.4
  audio_session: ^0.2.2
  simple_pip_mode: ^1.1.0
  wakelock_plus: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  flutter_gen_runner: ^5.13.0
  envied_generator: ^1.3.3
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/icons/
    - assets/docs/
    - assets/lottie/
    - assets/images/
    - assets/svg/
    - assets/logo/
    - assets/app/
    - assets/images/armchair/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_gen:
  output: lib/product/generated/
  integrations:
    lottie: true
    flutter_svg: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true


flutter_native_splash:
  # ColorsCustom.darkBlue (#1A1D21)
  color: "#1A1D21"
  image: assets/logo/logo.png
  android: true
  ios: true
  android_12:
    # ColorsCustom.darkBlue (#1A1D21)
    color: "#1A1D21"
    image: assets/logo/logo.png
  web: false
