<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoti'ye Katıl</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palette from colors_custom.dart */
      --dark-blue: #1A1D21;
      --dark-a-blue: #1E2229;
      --sky-blue: #69A2B8;
      --cream: #DEBCA4;

      /* Logic Assignments */
      --primary-color: var(--cream);
      --primary-hover: #cfb098;
      /* Slightly darkened cream for hover */
      --bg-color: var(--dark-blue);
      --card-bg: var(--dark-a-blue);
      --text-color: #ffffff;
      --text-mid: #a0a0a0;
      /* Standard gray for description to ensure readability not specified but needed */
      --accent-blue: var(--sky-blue);
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      /* Subtle gradients using our specific palette */
      background-image:
        radial-gradient(circle at 10% 20%, rgba(105, 162, 184, 0.1) 0%, transparent 40%),
        /* skyBlue tint */
        radial-gradient(circle at 90% 80%, rgba(222, 188, 164, 0.05) 0%, transparent 40%);
      /* cream tint */
      color: var(--text-color);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(222, 188, 164, 0.1);
      /* Subtle cream border */
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 24px;
      border: 4px solid var(--bg-color);
      /* blends with bg outside */
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: -0.5px;
      color: var(--cream);
    }

    p {
      color: var(--text-mid);
      font-size: 15px;
      line-height: 1.5;
      margin: 0 0 24px 0;
    }

    .room-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(105, 162, 184, 0.1);
      /* Sky blue tint */
      color: var(--sky-blue);
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      border: 1px solid rgba(105, 162, 184, 0.2);
    }

    .dot {
      width: 6px;
      height: 6px;
      background-color: var(--cream);
      border-radius: 50%;
      margin-right: 8px;
      box-shadow: 0 0 8px rgba(222, 188, 164, 0.4);
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .feature {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 12px;
      color: var(--text-mid);
    }

    .feature-icon {
      font-size: 20px;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: all 0.2s ease;
      box-sizing: border-box;
      cursor: pointer;
    }

    .btn-primary {
      background-color: var(--primary-color);
      color: var(--dark-blue);
      /* High contrast */
      box-shadow: 0 4px 12px rgba(222, 188, 164, 0.15);
      margin-bottom: 12px;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(222, 188, 164, 0.25);
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--sky-blue);
      border: 1px solid rgba(105, 162, 184, 0.3);
    }

    .btn-secondary:hover {
      color: var(--cream);
      border-color: var(--cream);
      background-color: rgba(26, 29, 33, 0.5);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
    }

    #fallback-message {
      display: none;
      margin-top: 15px;
      font-size: 13px;
      color: var(--sky-blue);
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <img src="/logo.png" alt="Emoti Logo" class="logo">

      <h1>Emoti'ye Davetlisiniz</h1>

      <div id="room-info" class="room-badge" style="display: none;">
        <span class="dot"></span>
        <span id="room-id-display">Oda #</span>
      </div>

      <p>Arkadaşlarınızla güvenli, hızlı ve eğlenceli bir görüşme deneyimine katılın.</p>

      <div class="features">
        <div class="feature">
          <span class="feature-icon">🔒</span>
          <span>Güvenli</span>
        </div>
        <div class="feature">
          <span class="feature-icon">⚡</span>
          <span>Hızlı</span>
        </div>
        <div class="feature">
          <span class="feature-icon">🛡️</span>
          <span>Gizli</span>
        </div>
      </div>

      <a id="join-btn" href="#" class="btn btn-primary">Odaya Katıl</a>
      <a href="https://play.google.com/store/apps/details?id=com.esce.emoti" class="btn btn-secondary">Uygulamayı
        İndir</a>

      <div id="fallback-message">
        Otomatik yönlendirme yapılamadı, lütfen butona tıklayın.
      </div>

      <div class="footer">
        © 2026 Emoti. Tüm hakları saklıdır.
      </div>
    </div>
  </div>

  <script>
    window.onload = function () {
      // URL Analizi
      const path = window.location.pathname;

      // Oda ID'sini bulma
      let roomId = null;
      if (path.includes('/join/')) {
        roomId = path.split('/join/')[1];
      } else if (path !== '/' && path.length > 1) {
        // Eğer /12345 gibiyse
        roomId = path.substring(1).replace(/^\/+/, '');
      }

      // Derin Bağlantı (Deep Link) Oluşturma
      let deepLink = "emotional://";

      if (roomId) {
        // UI Güncelleme
        document.getElementById('room-info').style.display = 'inline-flex';
        document.getElementById('room-id-display').textContent = `Oda #${roomId}`;
        document.title = `Oda #${roomId} - Emoti`;

        deepLink += "join/" + roomId;
      } else {
        deepLink += "home";
      }

      // Buton linkini güncelle
      const joinBtn = document.getElementById('join-btn');
      joinBtn.href = deepLink;

      // Otomatik yönlendirme denemesi
      console.log("Yönlendiriliyor: " + deepLink);
      window.location.href = deepLink;

      // Tıklama olayını da garantiye al
      joinBtn.onclick = function () {
        window.location.href = deepLink;
        setTimeout(function () {
          document.getElementById('fallback-message').style.display = 'block';
        }, 1000);
        return false;
      };

      // Eğer uygulama açılmazsa fallback mesajını göster
      setTimeout(function () {
        if (document.hidden) return; // Sayfa arka plana gittiyse uygulama açılmıştır
        document.getElementById('fallback-message').style.display = 'block';
      }, 2500);
    };
  </script>
</body>

</html>
